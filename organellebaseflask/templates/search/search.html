{% extends 'base.html' %}

{% block header %}
  <h1 class="text-center">Organelle Ambiguity Search</h1>
  <h2 class="text-center">Search any organism on GenBank.</h2>
{% endblock %}

{% block content %}
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="search-container mt-4">
          <input type="text" id="organism" class="form-control search-input" placeholder="Search...">
          <i class="fas fa-search search-icon" onclick="doSearch()" style="cursor: pointer;"></i>
        </div>
      </div>
    </div>
  </div>

<script>
  function doSearch() {
    const organism = document.getElementById('organism').value.trim();
    if (organism === '') {
        alert('Please enter an organism name.');
        return;
    }
    window.location.href = '/search/' + organism;
  }

  document.getElementById('organism').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        doSearch();
    }
  });
</script>

{% endblock %}
