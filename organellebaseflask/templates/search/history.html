{% extends 'base.html' %}

{% block header %}
  <h1 class="text-center">{{ g.user['username'] }}</h1>
  <h1 class="text-center">Your Search History</h1>
{% endblock %}

{% block content %}

<div class="container">
  <table class="table table-striped table-hover">
    <thead class="thead-dark">
      <tr>
        <th>Search Term</th>
        <th>Time</th>
        <th>Results Found</th>
      </tr>
    </thead>
    <tbody>
      {% for search in history %}
      <tr>
        <td>{{ search['organism'] }}</td>
        <td>{{ search['created'] }}</td>
        <td>{{ search['result_count'] }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
